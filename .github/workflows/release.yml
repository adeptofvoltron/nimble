name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            binary: nimble
          - os: macos-14
            target: darwin-arm64
            binary: nimble
          - os: macos-13
            target: darwin-x64
            binary: nimble
          - os: windows-latest
            target: windows-x64
            binary: nimble.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build binary
        run: >
          pyinstaller --onefile --name nimble
          --collect-all pynput
          nimble/__main__.py

      - name: Smoke test binary (Unix)
        if: runner.os != 'Windows'
        run: ./dist/nimble --help

      - name: Smoke test binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\dist\nimble.exe --help

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv dist/nimble dist/nimble-${{ matrix.target }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item dist\nimble.exe dist\nimble-${{ matrix.target }}.exe

      - name: Generate SHA256 (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist
          sha256sum nimble-${{ matrix.target }} > nimble-${{ matrix.target }}.sha256

      - name: Generate SHA256 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "dist\nimble-${{ matrix.target }}.exe" -Algorithm SHA256).Hash
          $hash | Out-File -FilePath "dist\nimble-${{ matrix.target }}.exe.sha256" -NoNewline -Encoding ascii

      - name: Upload release assets (Unix)
        if: runner.os != 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/nimble-${{ matrix.target }}
            dist/nimble-${{ matrix.target }}.sha256

      - name: Upload release assets (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/nimble-${{ matrix.target }}.exe
            dist/nimble-${{ matrix.target }}.exe.sha256
